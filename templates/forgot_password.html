<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Reset | RetinalAI</title>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6 font-['Plus_Jakarta_Sans']">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full border border-slate-100">
        <h2 class="text-2xl font-bold mb-2 text-slate-800">Reset Password</h2>
        <p class="text-slate-500 mb-8 text-sm">A 4-digit code will be sent to your inbox.</p>
        
        <form method="POST" class="space-y-4">
            <input type="email" name="email" placeholder="Enter your email" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">Send Verification Code</button>
        </form>
        <div class="mt-6 text-center">
            <a href="/login" class="text-sm text-slate-400 hover:text-blue-600 font-bold">Back to Login</a>
        </div>
    </div>
</body>
</html>
