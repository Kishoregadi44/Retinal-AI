<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>New Password | Retinal AI</title>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-10 rounded-3xl shadow-xl max-w-md w-full border border-slate-100">
        <h2 class="text-2xl font-bold mb-2 text-slate-800">New Password</h2>
        <p class="text-slate-500 mb-8 text-sm">Please enter and confirm your new password.</p>
        
        <form action="/update_password" method="POST" class="space-y-4">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="password" name="new_password" placeholder="New Password" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500">
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg">Update Password</button>
        </form>
    </div>
</body>
</html>
