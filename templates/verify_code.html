<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Verify Code | Retinal AI</title>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-10 rounded-3xl shadow-xl max-w-md w-full border border-slate-100 text-center">
        <h2 class="text-2xl font-bold mb-2 text-slate-800">Verification</h2>
        <p class="text-slate-500 mb-8 text-sm">A 4-digit code was sent to <b>{{ email }}</b></p>
        
        <form action="/verify_reset" method="POST" class="space-y-4">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="text" name="code" maxlength="4" placeholder="4-Digit Code" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-center text-2xl tracking-[1rem] focus:ring-2 focus:ring-blue-500">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg">Verify Code</button>
        </form>
    </div>
</body>
</html>
